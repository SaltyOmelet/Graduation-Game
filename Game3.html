<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The King's Battlefield</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    color: #2c2c2c;
    background: url('https://www.transparenttextures.com/patterns/aged-paper.png');
  }

  h1 {
    margin-top: 15px;
  }

  #turnIndicator {
    font-weight: bold;
    margin-top: 10px;
  }

  #gameContainer {
    position: relative;
    width: 320px;
    margin: 20px auto;
    padding: 10px;
    background: rgba(0,0,0,0.15);
    border: 3px solid #5a4a2f;
  }

  /* Medieval battlefield feel */
  #gameContainer::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Old_map_background.jpg/800px-Old_map_background.jpg');
    background-size: cover;
    opacity: 0.4;
    z-index: 0;
  }

  #game {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(6, 50px);
    gap: 4px;
    justify-content: center;
  }

  .cell {
    width: 50px;
    height: 50px;
    background: rgba(217, 199, 161, 0.8);
    border: 1px solid #3e3e3e;
    cursor: pointer;
    font-size: 18px;
  }

  .hit {
    background: #8b0000;
    color: white;
  }

  .miss {
    background: #555;
    color: white;
  }

  #log {
    margin-top: 15px;
    min-height: 60px;
    font-style: italic;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h1>⚔️ The King's Battlefield ⚔️</h1>

<div id="turnIndicator">Your Turn</div>

<div id="gameContainer">
  <div id="game"></div>
</div>

<div id="log">Choose your first strike...</div>

<button onclick="restartGame()">Restart</button>

<script>
const size = 6;
let grid = [];
let hits = 0;
let totalShipCells = 9;
let gameOver = false;
let playerTurn = true;

const log = document.getElementById("log");
const gameDiv = document.getElementById("game");
const turnIndicator = document.getElementById("turnIndicator");

function initGame() {
  grid = Array(size).fill().map(() => Array(size).fill(0));
  hits = 0;
  gameOver = false;
  playerTurn = true;
  gameDiv.innerHTML = "";
  placeShips();
  drawGrid();
  updateTurnUI();
}

function updateTurnUI() {
  turnIndicator.innerText = playerTurn ? "🟢 Your Turn" : "🔴 Enemy Turn";
}

function placeShips() {
  let shipSizes = [3, 2, 2, 1, 1];

  shipSizes.forEach(size => {
    let placed = false;

    while (!placed) {
      let dir = Math.random() < 0.5 ? "H" : "V";
      let row = Math.floor(Math.random() * 6);
      let col = Math.floor(Math.random() * 6);

      let fits = true;
      let coords = [];

      for (let i = 0; i < size; i++) {
        let r = row + (dir === "V" ? i : 0);
        let c = col + (dir === "H" ? i : 0);

        if (r >= 6 || c >= 6 || grid[r][c] === 1) {
          fits = false;
          break;
        }
        coords.push([r, c]);
      }

      if (fits) {
        coords.forEach(([r, c]) => grid[r][c] = 1);
        placed = true;
      }
    }
  });
}

function drawGrid() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      let cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener("click", handleClick);
      gameDiv.appendChild(cell);
    }
  }
}

function handleClick(e) {
  if (gameOver || !playerTurn) return;

  let cell = e.target;
  let r = parseInt(cell.dataset.row);
  let c = parseInt(cell.dataset.col);

  if (cell.classList.contains("hit") || cell.classList.contains("miss")) return;

  if (grid[r][c] === 1) {
    cell.classList.add("hit");
    cell.innerHTML = "⚔️";
    hits++;
    log.innerText = "A direct strike! A unit has fallen.";
  } else {
    cell.classList.add("miss");
    cell.innerHTML = "🌫️";
    log.innerText = "Your attack found nothing...";
  }

  if (hits === totalShipCells) {
    winGame();
    return;
  }

  playerTurn = false;
  updateTurnUI();

  setTimeout(aiTurn, 1000);
}

let lastHit = null;

function aiTurn() {
  if (gameOver) return;

  let r, c;

  if (lastHit) {
    let options = [
      [lastHit[0] + 1, lastHit[1]],
      [lastHit[0] - 1, lastHit[1]],
      [lastHit[0], lastHit[1] + 1],
      [lastHit[0], lastHit[1] - 1]
    ];

    options = options.filter(([x, y]) => x >= 0 && y >= 0 && x < size && y < size);
    let choice = options[Math.floor(Math.random() * options.length)];
    r = choice[0];
    c = choice[1];
    lastHit = null;
  } else {
    r = Math.floor(Math.random() * size);
    c = Math.floor(Math.random() * size);
  }

  if (Math.random() < 0.3) {
    log.innerText = "🏹 The King's army strikes true!";
    lastHit = [r, c];
  } else {
    log.innerText = "Their forces search blindly...";
  }

  setTimeout(() => {
    playerTurn = true;
    updateTurnUI();
    log.innerText += " Your move...";
  }, 800);
}

function winGame() {
  gameOver = true;

  setTimeout(() => {
    log.innerHTML = `
    The battlefield is quiet...<br><br>
    But the war is not over.<br><br>
    You have learned to read the field.<br><br>
    <strong>Mark what you conquered:</strong><br><br>
    Coordinates: <strong>Row 3, Column 5</strong><br><br>
    Find the wall.
    `;
  }, 500);
}

function restartGame() {
  initGame();
  log.innerText = "Choose your first strike...";
}

initGame();
</script>

</body>
</html>
