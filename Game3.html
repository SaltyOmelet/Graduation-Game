<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The King's Battlefield</title>

<style>

  * {
    box-sizing: border-box;
  }
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    color: #2c2c2c;
    background: url('https://www.transparenttextures.com/patterns/aged-paper.png');
  }

  h1 {
    margin-top: 10px;
    font-size: 1.5rem;
  }

  #turnIndicator {
    font-weight: bold;
    margin-top: 5px;
  }

  /* 🔥 RESPONSIVE CONTAINER */
  #gameContainer {
    position: relative;
    width: 88vw;              /* takes most of screen width */
    max-width: 420px;        /* prevents it from getting too big on desktop */
    margin: 10px auto;
    padding: 6px;
    background: rgba(0,0,0,0.15);
    border: 3px solid #5a4a2f;
    position: relative;
    overflow: hidden;   /* 🔥 prevents any spill */
  }

  #gameContainer::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Old_map_background.jpg/800px-Old_map_background.jpg');
    background-size: cover;
    opacity: 0.4;
    z-index: 0;
  }

  /* 🔥 RESPONSIVE GRID */
  #game {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(6, 1fr); /* flexible columns */
    gap: 3px;

    width: 100%;        /* 🔥 ensures it stays inside container */
  }

  /* 🔥 SQUARE CELLS THAT SCALE */
  .cell {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(217, 199, 161, 0.85);
    border: 1px solid #3e3e3e;
    cursor: pointer;
  
    display: flex;
    align-items: center;
    justify-content: center;
  
    font-size: 1.2rem;
    line-height: 1;        /* 🔥 fixes vertical offset */
    padding: 0;            /* 🔥 removes hidden spacing */

    overflow: hidden;   /* 🔥 prevents visual spill */
  }

  .hit {
    background: #8b0000;
    color: white;
  }

  .miss {
    background: #555;
    color: white;
  }

  .cell span {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #log {
    margin: 10px;
    min-height: 60px;
    font-style: italic;
    font-size: 0.95rem;
  }

  button {
    margin-top: 5px;
    padding: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>⚔️ The King's Battlefield ⚔️</h1>

<div id="turnIndicator">Your Turn</div>

<div id="gameContainer">
  <div id="game"></div>
</div>

<div id="log">Choose your first strike...</div>

<button onclick="restartGame()">Restart</button>

<script>
const size = 6;
let grid = [];
let hits = 0;
let totalShipCells = 9;
let gameOver = false;
let playerTurn = true;
let aiShots = new Set();   // tracks all AI guesses
let targetQueue = [];      // stores next smart targets
let playerGrid = [];
let playerShipsRemaining = 9;

const log = document.getElementById("log");
const gameDiv = document.getElementById("game");
const turnIndicator = document.getElementById("turnIndicator");

function initGame() {
  grid = Array(size).fill().map(() => Array(size).fill(0));
  playerGrid = Array(size).fill().map(() => Array(size).fill(0));
  hits = 0;
  playerShipsRemaining = 9;
  gameOver = false;
  playerTurn = true;
  aiShots = new Set();
  targetQueue = [];
  gameDiv.innerHTML = "";
  placeShips(grid);        // enemy board
  placeShips(playerGrid);  // 🔥 player board
  drawGrid();
  updateTurnUI();
}

function updateTurnUI() {
  turnIndicator.innerText = playerTurn ? "🟢 Your Turn" : "🔴 Enemy Turn";
}

function placeShips(targetGrid) {
  let shipSizes = [3, 2, 2, 1, 1];

  shipSizes.forEach(size => {
    let placed = false;

    while (!placed) {
      let dir = Math.random() < 0.5 ? "H" : "V";
      let row = Math.floor(Math.random() * size);
      let col = Math.floor(Math.random() * size);

      let fits = true;
      let coords = [];

      for (let i = 0; i < size; i++) {
        let r = row + (dir === "V" ? i : 0);
        let c = col + (dir === "H" ? i : 0);

        if (r >= size || c >= size || targetGrid[r][c] === 1) {
          fits = false;
          break;
        }
        coords.push([r, c]);
      }

      if (fits) {
        coords.forEach(([r, c]) => targetGrid[r][c] = 1);
        placed = true;
      }
    }
  });
}

function drawGrid() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      let cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener("click", handleClick);
      gameDiv.appendChild(cell);
    }
  }
}

function handleClick(e) {
  if (gameOver || !playerTurn) return;

  let cell = e.target;
  let r = parseInt(cell.dataset.row);
  let c = parseInt(cell.dataset.col);

  if (cell.classList.contains("hit") || cell.classList.contains("miss")) return;

  if (grid[r][c] === 1) {
    cell.classList.add("hit");
    cell.innerHTML = "<span>⚔️</span>";
    hits++;
    log.innerText = "A direct strike! A unit has fallen.";
  } else {
    cell.classList.add("miss");
    cell.innerHTML = "<span>🌫️</span>";
    log.innerText = "Your attack found nothing...";
  }

  if (hits === totalShipCells) {
    winGame();
    return;
  }

  playerTurn = false;
  updateTurnUI();

  setTimeout(aiTurn, 1000);
}

let lastHit = null;

function aiTurn() {
  if (gameOver) return;

  let r, c;

  // 🎯 TARGET MODE (if we have queued targets)
  if (targetQueue.length > 0) {
    let next = targetQueue.shift();
    r = next[0];
    c = next[1];
  } else {
    // 🔍 HUNT MODE (random but not repeated)
    do {
      r = Math.floor(Math.random() * size);
      c = Math.floor(Math.random() * size);
    } while (
      aiShots.has(`${r},${c}`) || 
      (r + c) % 2 !== 0
    )};

  aiShots.add(`${r},${c}`);

  // AI is now playing against the player on their board 
  let isHit = playerGrid[r][c] === 1;

  if (isHit) {
    playerGrid[r][c] = -1; // mark as hit
    playerShipsRemaining--;

    log.innerText = `🏹 The King's army strikes true! You have ${playerShipsRemaining} health remaining.`;

    if (playerHealth <= 0) {
      loseGame();
      return;
    }

    // Add surrounding tiles to target queue
    let directions = [
      [r + 1, c],
      [r - 1, c],
      [r, c + 1],
      [r, c - 1]
    ];

    directions.forEach(([nr, nc]) => {
      if (
        nr >= 0 && nc >= 0 &&
        nr < size && nc < size &&
        !aiShots.has(`${nr},${nc}`)
      ) {
        targetQueue.push([nr, nc]);
      }
    });

   // 🔥 LOSE CONDITION
     if (playerShipsRemaining <= 0) {
       loseGame();
       return;
     }
   
  } else {
    log.innerText = "Their forces search blindly...";
  }

  setTimeout(() => {
    playerTurn = true;
    updateTurnUI();
    log.innerText += " Your move...";
  }, 800);
}

function winGame() {
  gameOver = true;

  setTimeout(() => {
    log.innerHTML = `
    The battlefield is quiet...<br><br>
    But the war is not over.<br><br>
    You have learned to read the field.<br><br>
    <strong>Mark what you conquered:</strong><br><br>
    Coordinates: <strong>Row 3, Column 5</strong><br><br>
    Find the wall.
    `;
  }, 500);
}

function loseGame() {
  gameOver = true;

  setTimeout(() => {
    log.innerHTML = `
    The battlefield falls silent...<br><br>
    You have been defeated.<br><br>
    The King remains.<br><br>
    Try again.
    `;
  }, 500);
} 
 
function restartGame() {
  initGame();
  log.innerText = "Choose your first strike...";
}

initGame();
</script>

</body>
</html>
